name: Release

# Triggered by pushing a version tag (e.g. v0.1.78)
# Builds Windows + Linux artifacts and uploads to the same GitHub Release.
on:
  push:
    tags: ['v*']

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.78)'
        required: true

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Build + package + publish to GitHub Releases.
      # Version bump is 'none' because the tag already represents the version
      # (bumped and committed before tagging).
      - name: Build and publish
        run: node scripts/build.mjs none --platform ${{ matrix.platform }} --release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
