name: Release

# Tag pushes auto-build the stable channel.
# Non-stable channels (seth / brazen) are cut via workflow_dispatch at the
# same tag — they upload to the SAME GitHub release but produce their own
# channel-specific installer + update feed (e.g. VALOR-Setup-brazen.exe +
# brazen.yml). This lets stable users opt into a non-stable channel via
# Settings → Release Channel; electron-updater downloads the cross-channel
# installer and NSIS upgrades in place (same appId).
on:
  push:
    tags: ['v*']

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.2.113)'
        required: true
      channel:
        description: 'Release channel'
        required: true
        default: 'brazen'
        type: choice
        options:
          - stable
          - seth
          - brazen

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fetch the bundled mpv binary on Windows runners. mpv.exe + DLLs are
      # gitignored (too large for GitHub), so a fresh CI checkout has none of
      # them — without this step electron-builder produces a Windows installer
      # missing resources/mpv/, and the mpv player engine silently falls back
      # to the built-in HLS player on every install.
      #
      # Bump MPV_TAG when you want a newer mpv. The 7z asset name is
      # mpv-x86_64-<TAG>-git-<HASH>.7z — the hash changes per release, so the
      # script discovers the exact asset name via the GitHub API.
      - name: Fetch bundled mpv (Windows)
        if: matrix.platform == 'win'
        shell: bash
        env:
          MPV_TAG: '20260421'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ASSET_URL=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/tags/$MPV_TAG" \
            | grep -oE '"browser_download_url":\s*"[^"]+mpv-x86_64-[0-9]+-git-[a-f0-9]+\.7z"' \
            | head -1 | sed 's/.*: *"//;s/"$//')
          if [ -z "$ASSET_URL" ]; then
            echo "Could not find mpv-x86_64-*.7z on shinchiro release $MPV_TAG"; exit 1
          fi
          echo "Downloading $ASSET_URL"
          curl -L -o mpv.7z "$ASSET_URL"
          mkdir -p resources/mpv
          7z x mpv.7z -oresources/mpv -y
          rm mpv.7z
          ls -la resources/mpv/mpv.exe resources/mpv/d3dcompiler_43.dll

      # Build only — no publish from electron-builder. Version bump is 'none'
      # because the tag already represents the version (bumped and committed
      # beforehand). Channel defaults to stable when invoked by a tag push;
      # workflow_dispatch can override. build.mjs reads CI=true and routes
      # this to `--publish never`; the upload step below handles publishing.
      - name: Build
        run: node scripts/build.mjs none --platform ${{ matrix.platform }} --channel ${{ github.event.inputs.channel || 'stable' }} --release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload via gh CLI instead of electron-builder's GitHub publisher.
      # electron-builder refuses to publish to a release whose created_at is
      # older than 2 hours (a safety against accidentally clobbering old
      # releases). That bit us repeatedly when promoting a brazen build to
      # stable hours after the brazen artifacts went up. gh release upload
      # has no such limit — it just talks to the REST API.
      #
      # Race note: both platforms run in parallel. If neither has uploaded
      # yet, we may both try to `gh release create`; the loser hits "already
      # exists". The `|| true` swallows that. The subsequent upload then
      # works for both.
      - name: Upload artifacts to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          REPO="${{ github.repository }}"
          # Ensure the tag is a real git ref (workflow_dispatch can pass a SHA
          # as `tag` — gh release create needs an actual tag name. For SHAs we
          # synthesize "v<version-from-package.json>" since that's what
          # electron-builder would have used.)
          if [[ ! "$TAG" =~ ^v[0-9] ]]; then
            VERSION=$(node -p "require('./package.json').version")
            TAG="v$VERSION"
            echo "Resolved SHA dispatch → tag $TAG"
          fi
          # Create release if it doesn't exist. Tolerate the race where the
          # parallel matrix job created it between our check and our create.
          if ! gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1; then
            gh release create "$TAG" --repo "$REPO" \
              --title "$TAG" \
              --notes "Auto-published by CI." \
              --target "${{ github.sha }}" \
              || gh release view "$TAG" --repo "$REPO" >/dev/null 2>&1
          fi
          # Gather artifacts. nullglob so non-matching globs disappear instead
          # of being passed literally (Linux jobs have no .exe, Windows has no
          # .deb/.AppImage).
          shopt -s nullglob
          files=(
            dist/VALOR-Setup*.exe
            dist/VALOR-Setup*.exe.blockmap
            dist/VALOR-Setup*.AppImage
            dist/VALOR-Setup*.deb
            dist/latest*.yml
            dist/seth*.yml
            dist/brazen*.yml
          )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No artifacts found in dist/"
            ls -la dist/ || true
            exit 1
          fi
          echo "Uploading ${#files[@]} files to $TAG:"
          printf '  %s\n' "${files[@]}"
          gh release upload "$TAG" --repo "$REPO" --clobber "${files[@]}"
