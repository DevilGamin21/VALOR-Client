name: Release

# Triggered by pushing a version tag (e.g. v0.1.78)
# Builds Windows + Linux artifacts and uploads to the same GitHub Release.
on:
  push:
    tags: ['v*']

  # Allow manual trigger from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.78)'
        required: true

permissions:
  contents: write  # needed to create releases and upload assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fetch the bundled mpv binary on Windows runners. mpv.exe + DLLs are
      # gitignored (too large for GitHub), so a fresh CI checkout has none of
      # them — without this step electron-builder produces a Windows installer
      # missing resources/mpv/, and the mpv player engine silently falls back
      # to the built-in HLS player on every install.
      #
      # Bump MPV_TAG when you want a newer mpv. The 7z asset name is
      # mpv-x86_64-<TAG>-git-<HASH>.7z — the hash changes per release, so the
      # script discovers the exact asset name via the GitHub API.
      - name: Fetch bundled mpv (Windows)
        if: matrix.platform == 'win'
        shell: bash
        env:
          MPV_TAG: '20260421'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ASSET_URL=$(curl -s -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/shinchiro/mpv-winbuild-cmake/releases/tags/$MPV_TAG" \
            | grep -oE '"browser_download_url":\s*"[^"]+mpv-x86_64-[0-9]+-git-[a-f0-9]+\.7z"' \
            | head -1 | sed 's/.*: *"//;s/"$//')
          if [ -z "$ASSET_URL" ]; then
            echo "Could not find mpv-x86_64-*.7z on shinchiro release $MPV_TAG"; exit 1
          fi
          echo "Downloading $ASSET_URL"
          curl -L -o mpv.7z "$ASSET_URL"
          mkdir -p resources/mpv
          7z x mpv.7z -oresources/mpv -y
          rm mpv.7z
          ls -la resources/mpv/mpv.exe resources/mpv/d3dcompiler_43.dll

      # Build + package + publish to GitHub Releases.
      # Version bump is 'none' because the tag already represents the version
      # (bumped and committed before tagging).
      - name: Build and publish
        run: node scripts/build.mjs none --platform ${{ matrix.platform }} --release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
